name: CI Pipeline LogMeIn

# 1. Quand est-ce que ce pipeline se lance ?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ----------------------------------------------------
  # JOB 1 : TESTS AUTOMATISÉS DU BACKEND
  # ----------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest

    # Astuce DevOps : On crée une DB temporaire juste pour les tests !
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: logs_db
          POSTGRES_USER: logs_user
          POSTGRES_PASSWORD: logs_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements.dev.txt

      - name: 🧪 Lancer les tests unitaires (pytest)
        env:
          DB_HOST: localhost
          DB_NAME: logs_db
          DB_USER: logs_user
          DB_PASSWORD: logs_password
          DB_PORT: 5432
        run: |
          cd backend
          python -m pytest tests/test_api.py -v

  # ----------------------------------------------------
  # JOB 2 : CODE SCANNING (Analyse de Sécurité)
  # ----------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🕵️ Installer Bandit (Scanner de sécurité Python)
        run: pip install bandit

      - name: 🔍 Analyser le code backend à la recherche de failles
        run: bandit -r backend/ -ll
# ----------------------------------------------------
  # JOB 3 : BUILD & PUSH (Continuous Deployment)
  # ----------------------------------------------------
  build-and-push:
    needs: [test-backend, security-scan] # Ce job attend que les tests soient réussis !
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # On déploie UNIQUEMENT si on est sur la branche main

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      - name: 🔑 Se connecter à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build et Push du Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/logmein-backend:latest

      - name: 🏗️ Build et Push du Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/logmein-frontend:latest
